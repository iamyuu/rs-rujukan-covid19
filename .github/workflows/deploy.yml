name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      # Set up environment
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      # Detect base path and configure Pages
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      # Build web
      - name: Build web
        run: bun run build --public-url ${{ steps.pages.outputs.base_path }}

      # Upload build output
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # After build finished, deploy to GitHub Pages
      - id: deployment
        uses: actions/deploy-pages@v4
